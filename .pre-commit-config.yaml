ci:
    autofix_commit_msg: "[pre-commit.ci] auto fixes"
    autoupdate_schedule: monthly
    skip: [] # List hooks to skip in CI if needed

repos:
  - repo: local
    hooks:
      - id: block-ipynb-in-protected-dirs
        name: Protect examples and howtos
        files: ^(examples|howtos)/.*\.ipynb$
        entry: python -c "import sys; print('\n❌ ERROR: Direct edits to .ipynb in examples/ or howtos/ are forbidden.\n'); sys.exit(1)"
        language: system